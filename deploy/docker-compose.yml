# 第一步：基础设施（MySQL / Redis / Qdrant）
# 第二步：service-ai（FastAPI + Qdrant）
# 第三步：server-go（Gin；MYSQL/REDIS/RAG 使用服务名；APP_HOST=0.0.0.0）
# 第四步：web-frontend（Nginx 静态资源；/api → server-go，/knowledge-bases → service-ai）
#
# 在仓库根目录执行：
#   docker compose -f deploy/docker-compose.yml --env-file .env up -d --build
# 或在 deploy 目录：
#   docker compose --env-file ../.env up -d --build

services:
  mysql:
    image: mysql:latest
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DB_NAME}
    ports:
      - "${MYSQL_PORT}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-143737yj}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:latest
    restart: unless-stopped
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    ports:
      - "${QDRANT_HTTP_PORT}:6333"
      - "${QDRANT_GRPC_PORT}:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

  service-ai:
    build:
      context: ../service-ai
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - qdrant
    env_file:
      - ../.env
    environment:
      # 覆盖 .env 中的 localhost，使容器内访问 Qdrant 使用服务名
      QDRANT_URL: http://qdrant:6333
    ports:
      - "${SERVICE_AI_PORT}:8000"

  server-go:
    build:
      context: ../server-go
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      service-ai:
        condition: service_started
    env_file:
      - ../.env
    environment:
      # 覆盖 .env 中的本机地址；Compose 中 environment 优先于 env_file
      APP_HOST: 0.0.0.0
      APP_PORT: "3000"
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      RAG_HOST: service-ai
      RAG_PORT: "8000"
    ports:
      - "${SERVER_GO_PORT}:3000"

  web-frontend:
    build:
      context: ../web-frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - server-go
      - service-ai
    ports:
      - "${WEB_FRONTEND_PORT}:80"

volumes:
  mysql_data:
  redis_data:
  qdrant_storage:
